name: Backend Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/backend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'packages/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --workspaces

      - name: Lint
        run: npm -w packages/backend run lint || true

      - name: Test
        run: npm -w packages/backend test || true
